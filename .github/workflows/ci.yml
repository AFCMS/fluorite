---
name: CI

on:
  push:
    branches:
      - master
    tags:
      - "*"
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      use_cache:
        description: "Use build cache"
        required: true
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Use Node.js LTS/Krypton
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build

      - name: Lint project
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Use Node.js LTS/Krypton
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build
        env:
          VITE_DISABLE_VERCEL_ANALYTICS: "true"

      - name: Run Lighthouse CI
        run: pnpm lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  caddyconfig:
    runs-on: ubuntu-latest
    container: caddy:2-alpine
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Caddy configuration
        run: caddy validate Caddyfile

  docker:
    needs:
      - caddyconfig
      - build
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      output: image
      platforms: linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7,linux/ppc64le,linux/riscv64,linux/s390x
      push: ${{ github.event_name != 'pull_request' }}
      cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
      sign: auto
      sbom: true
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=ref,event=branch
        type=ref,event=pr
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=semver,pattern={{major}}
      set-meta-annotations: true
      set-meta-labels: true
      labels: |
        org.opencontainers.image.title=Fluorite
        org.opencontainers.image.description=An elegant PWA video player
        org.opencontainers.image.authors=AFCMS <afcm.contact@gmail.com>
        org.opencontainers.image.licenses=GPL-3.0-only
        org.opencontainers.image.source=https://github.com/AFCMS/fluorite
        io.artifacthub.package.logo-url=https://raw.githubusercontent.com/AFCMS/fluorite/refs/heads/master/public/fluorite.svg
        io.artifacthub.package.readme-url=https://raw.githubusercontent.com/AFCMS/fluorite/refs/heads/master/.github/README_ARTIFACTHUB.md
        io.artifacthub.package.category=skip-prediction
        io.artifacthub.package.keywords=video-player,offline,pwa
        io.artifacthub.package.license=GPL-3.0-only
        io.artifacthub.package.maintainers=[{"name":"AFCMS","email":"afcm.contact@gmail.com"}]
      annotations: |
        org.opencontainers.image.title=Fluorite
        org.opencontainers.image.description=An elegant PWA video player
        org.opencontainers.image.authors=AFCMS <afcm.contact@gmail.com>
        org.opencontainers.image.licenses=GPL-3.0-only
        org.opencontainers.image.source=https://github.com/AFCMS/fluorite
        io.artifacthub.package.logo-url=https://raw.githubusercontent.com/AFCMS/fluorite/refs/heads/master/public/fluorite.svg
        io.artifacthub.package.readme-url=https://raw.githubusercontent.com/AFCMS/fluorite/refs/heads/master/.github/README_ARTIFACTHUB.md
        io.artifacthub.package.category=skip-prediction
        io.artifacthub.package.keywords=video-player,offline,pwa
        io.artifacthub.package.license=GPL-3.0-only
        io.artifacthub.package.maintainers=[{"name":"AFCMS","email":"afcm.contact@gmail.com"}]

    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: "4.1.1"
        id: helm-install

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login --username ${{ github.actor }} ghcr.io --password-stdin

      - name: Lint Helm chart
        run: helm lint ./helm

      - name: Package Helm chart
        run: helm package ./helm

      - name: Upload Helm chart as artifact
        uses: actions/upload-artifact@v7
        with:
          path: fluorite-chart-*.tgz
          archive: false

      - name: Publish Helm chart to GHCR
        if: github.event_name != 'pull_request'
        run: |
          REPO_OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push fluorite-chart-*.tgz oci://ghcr.io/${REPO_OWNER_LOWERCASE}
