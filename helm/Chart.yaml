---
apiVersion: v2
name: fluorite-chart
description: A Helm chart for running Fluorite, a web-based video player
icon: https://raw.githubusercontent.com/AFCMS/fluorite/refs/heads/master/public/fluorite.svg

type: application

# This is the chart version. This version number should be incremented each time you make changes
# to the chart and its templates, including the app version.
# Versions are expected to follow Semantic Versioning (https://semver.org/)
version: 0.1.0

# This is the version number of the application being deployed. This version number should be
# incremented each time you make changes to the application. Versions are not expected to
# follow Semantic Versioning. They should reflect the version the application is using.
# It is recommended to use it with quotes.
appVersion: "master"

# Artifact Hub annotations
# yaml-language-server-disable
artifacthub.io/category: skip-prediction
# yaml-language-server-disable
artifacthub.io/images: |
  - name: fluorite
    image: ghcr.io/afcms/fluorite:master
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v6
      - linux/arm/v7
      - linux/ppc64le
      - linux/riscv64
      - linux/s390x
# yaml-language-server-disable
artifacthub.io/license: GPL-3.0-only
# yaml-language-server-disable
artifacthub.io/links: |
  - name: support
    url: https://github.com/AFCMS/fluorite/issues
# yaml-language-server-disable
artifacthub.io/maintainers: |
  - name: AFCMS
    email: afcm.contact@gmail.com
# yaml-language-server-disable
artifacthub.io/operator: "true"
# yaml-language-server-disable
artifacthub.io/operatorCapabilities: "auto pilot"
# yaml-language-server-disable
artifacthub.io/prerelease: "false"
# yaml-language-server-disable
artifacthub.io/recommendations: |
  - url: https://artifacthub.io/packages/container/fluorite/fluorite
